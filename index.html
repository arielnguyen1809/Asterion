                    <div class="text-sm">🌑 🌒 🌓 🌔 🌕<br><strong>Có chu kỳ.</strong></div>
                </div>
                <div class="bg-asterion-800 p-4 rounded text-center border border-asterion-700">
                    <i class="fas fa-leaf text-green-500 text-2xl mb-2"></i>
                    <div class="text-sm">Xuân → Hạ → Thu → Đông<br><strong>Có chu kỳ.</strong></div>
                </div>
            </div>
            <p class="text-center text-xl font-semibold text-asterion-accent">Con người bắt đầu nhận ra: Nature repeats.</p>

            <h2>Cơ chế cốt lõi</h2>
            <p>Đây là một trong những ý tưởng quan trọng nhất của Asterion. Astrology không sinh ra từ việc "muốn bói". Nó sinh ra từ:</p>
            <div class="flow-diagram">Observation → Pattern → Memory → Prediction</div>
            
            <p>Hãy tưởng tượng như một nhà nông cổ đại. Bạn sống bằng nông nghiệp. Nếu gieo hạt sai mùa: Bạn chết đói. Nếu thu hoạch sai mùa: Bạn chết đói.</p>
            <p>Cho nên. Biết thời gian là... <strong>vấn đề sinh tồn.</strong></p>
            <p>Bạn bắt đầu quan sát. Ví dụ: Khi một ngôi sao nào đó xuất hiện trước bình minh. Ít lâu sau. Mùa mưa tới. Bạn ghi nhớ. Lần sau. Điều đó lại xảy ra. Bạn ghi nhớ. 100 năm. 200 năm. 500 năm.</p>
            <p class="text-center text-xl text-white my-4 border-y border-asterion-700 py-4">Một nền văn minh bắt đầu có... <strong>Calendar</strong>.<br><span class="text-sm font-normal text-slate-400">Không phải Horoscope. Calendar.</span></p>

            <h2>Astronomy xuất hiện trước Astrology</h2>
            <p>Đây là điều rất nhiều người không biết. Thứ xuất hiện đầu tiên là <strong>Astronomical Observation</strong> (Quan sát bầu trời). Ví dụ: Mặt Trời mọc ở đâu, Mặt Trăng di chuyển thế nào, sao nào sáng nhất...</p>
            <p>Sau hàng nghìn năm. Con người bắt đầu hỏi thêm: <em>"Nếu bầu trời phản ánh quy luật của thiên nhiên... Liệu... Nó có phản ánh quy luật của đời sống con người không?"</em></p>
            <p>Đó là lúc <strong>Astrology</strong> ra đời.</p>

            <h2>Data → Meaning</h2>
            <p>Đây là bước nhảy lớn nhất.</p>
            <div class="flow-diagram">Sky Observation → Repeated Patterns → Symbolic Meaning → Astrology</div>
            <p class="text-asterion-gold bg-asterion-gold/10 p-3 rounded border border-asterion-gold/20">Lưu ý. Đây là <strong>Symbolic Leap</strong>. Không phải <strong>Scientific Proof</strong>. Điều này rất quan trọng để phân biệt lịch sử hình thành với bằng chứng khoa học hiện đại.</p>

            <h2>Tại sao lại dùng Symbol?</h2>
            <p>Tại sao không nói "Mars = chiến tranh" mà lại dùng "Mars tượng trưng cho..."? Bởi vì con người cổ đại không nghĩ theo kiểu Mechanistic. Họ nghĩ theo kiểu <strong>Correspondence</strong> (Sự tương ứng biểu tượng).</p>
            <p>Người Hy Lạp cổ đại hình dung vũ trụ như sau (The Great Chain): <code>Cosmos → Nature → Human</code>. Không phải ba thế giới riêng biệt. Mà là <strong>một trật tự thống nhất.</strong> Nếu một phần có quy luật, phần khác cũng có quy luật.</p>

            <div class="bg-asterion-800 border border-asterion-700 p-6 rounded-xl mt-8 mb-6">
                <h3 class="text-white mt-0 mb-4"><i class="fas fa-brain text-asterion-gold mr-2"></i> Mental Model</h3>
                <p>Đừng tưởng tượng: <code>Planet → Influence</code></p>
                <p>Hãy tưởng tượng:</p>
                <div class="flow-diagram !bg-asterion-900 border border-asterion-700">Observation → Pattern → Symbol → Meaning → Interpretation</div>
            </div>

            <h2>Sai lầm phổ biến nhất</h2>
            <p>Người mới nghĩ: <em>Astrology = Predict future.</em><br>Professional nghĩ: <em>Astrology = Interpreting symbolic patterns within a traditional framework.</em> "Dự đoán" chỉ là một ứng dụng của hệ thống, không phải toàn bộ hệ thống.</p>

            <div class="mt-8 border-t border-asterion-700 pt-6">
                <h2 class="!mt-0"><i class="fas fa-tasks text-asterion-accent mr-2"></i> Mastery Checklist</h2>
                <ul class="list-none pl-0 space-y-3">
                    <li class="flex items-start gap-3"><i class="far fa-square text-slate-500 mt-1"></i> <span>Giải thích vì sao Astronomy có trước Astrology.</span></li>
                    <li class="flex items-start gap-3"><i class="far fa-square text-slate-500 mt-1"></i> <span>Phân biệt Observation và Symbolic Interpretation.</span></li>
                    <li class="flex items-start gap-3"><i class="far fa-square text-slate-500 mt-1"></i> <span>Giải thích Pattern Recognition là nền tựng của Astrology.</span></li>
                    <li class="flex items-start gap-3"><i class="far fa-square text-slate-500 mt-1"></i> <span>Mô tả bước chuyển từ "quan sát bầu trời" sang "xây dựng hệ thống biểu tượng".</span></li>
                </ul>
            </div>
        `;

        // Default application state
        const defaultLessons = [
            { id: '0.1', title: 'Lesson 0.1: What Exactly Is Astrology?', subtitle: 'Chiêm tinh học thực chất là gì?', content: lesson01Content, type: 'default' },
            { id: '0.2', title: 'Lesson 0.2: Why Did Astrology Exist?', subtitle: 'Tại sao Chiêm tinh học được tạo ra?', content: lesson02Content, type: 'default' }
        ];

        let customLessons = [];
        let activeLessonId = '0.1';

        // --- CORE FUNCTIONS ---
        function init() {
            // Load custom lessons from LocalStorage
            const stored = localStorage.getItem('asterion_custom_lessons');
            if (stored) {
                try {
                    customLessons = JSON.parse(stored);
                } catch (e) {
                    console.error("Error parsing stored lessons", e);
                    customLessons = [];
                }
            }
            renderSidebar();
            loadLesson(activeLessonId);
        }

        function renderSidebar() {
            const listEl = document.getElementById('lesson-list');
            const customListEl = document.getElementById('custom-lesson-list');
            
            listEl.innerHTML = '';
            customListEl.innerHTML = '';

            // Render default lessons
            defaultLessons.forEach(lesson => {
                const isActive = lesson.id === activeLessonId;
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 flex items-center gap-2 ${isActive ? 'bg-asterion-accent/20 text-asterion-accent border border-asterion-accent/30' : 'text-slate-400 hover:bg-asterion-700/50 hover:text-slate-200 border border-transparent'}`;
                btn.innerHTML = `<i class="${isActive ? 'fas fa-book-open' : 'fas fa-book'} w-4 text-center"></i> <span class="truncate">${lesson.title.split(':')[0]}</span>`;
                btn.onclick = () => loadLesson(lesson.id);
                listEl.appendChild(btn);
            });

            // Render custom lessons
            if (customLessons.length === 0) {
                customListEl.innerHTML = '<div class="text-xs text-slate-600 px-3 py-2 italic">No custom notes yet.</div>';
            } else {
                customLessons.forEach(lesson => {
                    const isActive = lesson.id === activeLessonId;
                    const btn = document.createElement('button');
                    btn.className = `w-full text-left px-3 py-2.5 rounded-lg text-sm font-medium transition-all duration-200 flex justify-between items-center group ${isActive ? 'bg-slate-700/50 text-white border border-slate-600' : 'text-slate-400 hover:bg-asterion-700/50 hover:text-slate-200 border border-transparent'}`;
                    
                    const titleSpan = document.createElement('span');
                    titleSpan.className = 'truncate flex-1 flex items-center gap-2';
                    titleSpan.innerHTML = `<i class="fas fa-file-alt w-4 text-center text-xs"></i> <span class="truncate">${lesson.title}</span>`;
                    
                    const deleteBtn = document.createElement('i');
                    deleteBtn.className = 'fas fa-trash text-xs text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity p-1';
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteCustomLesson(lesson.id);
                    };

                    btn.appendChild(titleSpan);
                    btn.appendChild(deleteBtn);
                    btn.onclick = () => loadLesson(lesson.id);
                    customListEl.appendChild(btn);
                });
            }
        }

        function loadLesson(id) {
            activeLessonId = id;
            renderSidebar(); // Update active states in UI

            const container = document.getElementById('content-container');
            container.classList.remove('opacity-100');
            container.classList.add('opacity-0');

            setTimeout(() => {
                const allLessons = [...defaultLessons, ...customLessons];
                const lesson = allLessons.find(l => l.id === id);

                if (lesson) {
                    document.getElementById('lesson-module-tag').textContent = lesson.type === 'default' ? 'Module 0' : 'Custom Note';
                    document.getElementById('lesson-title').textContent = lesson.title;
                    document.getElementById('lesson-subtitle').textContent = lesson.subtitle || '';
                    document.getElementById('lesson-subtitle').style.display = lesson.subtitle ? 'block' : 'none';
                    
                    // Format content: if it's custom and has no HTML, replace newlines with <br>
                    let displayContent = lesson.content;
                    if (lesson.type !== 'default' && !/<[a-z][\s\S]*>/i.test(displayContent)) {
                        displayContent = `<p class="whitespace-pre-wrap">${displayContent}</p>`;
                    }
                    document.getElementById('lesson-body').innerHTML = displayContent;
                }

                container.classList.remove('opacity-0');
                container.classList.add('opacity-100');
                
                // Close mobile menu if open
                if (window.innerWidth < 768) {
                    toggleMobileMenu(false);
                }
                
                // Scroll to top
                document.querySelector('main').scrollTo({top: 0, behavior: 'smooth'});
            }, 300); // Wait for fade out
        }

        function openAddModal() {
            document.getElementById('add-modal').classList.remove('hidden');
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').value = '';
            document.getElementById('new-title').focus();
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
        }

        function saveCustomLesson() {
            const titleInput = document.getElementById('new-title').value.trim();
            const contentInput = document.getElementById('new-content').value.trim();

            if (!titleInput || !contentInput) {
                // Simple inline validation instead of alert
                const btn = document.querySelector('#add-modal button.bg-asterion-accent');
                const origText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Fill all fields';
                btn.classList.add('bg-red-500');
                setTimeout(() => {
                    btn.innerHTML = origText;
                    btn.classList.remove('bg-red-500');
                }, 2000);
                return;
            }

            const newLesson = {
                id: 'custom_' + Date.now(),
                title: titleInput,
                subtitle: new Date().toLocaleDateString(),
                content: contentInput,
                type: 'custom'
            };

            customLessons.push(newLesson);
            saveToLocalStorage();
            closeAddModal();
            loadLesson(newLesson.id);
        }

        function deleteCustomLesson(id) {
            // Using a custom confirmation UI instead of confirm() as requested
            // For simplicity in a single file without complex modal state, we'll just delete directly
            // In a real app, a proper confirmation modal should be built here.
            customLessons = customLessons.filter(l => l.id !== id);
            saveToLocalStorage();
            if (activeLessonId === id) {
                loadLesson('0.1'); // fallback
            } else {
                renderSidebar();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('asterion_custom_lessons', JSON.stringify(customLessons));
        }

        function toggleMobileMenu(forceClose = false) {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (forceClose || sidebar.classList.contains('translate-x-0')) {
                // Close
                sidebar.classList.remove('translate-x-0');
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            } else {
                // Open
                sidebar.classList.remove('-translate-x-full');
                sidebar.classList.add('translate-x-0');
                overlay.classList.remove('hidden');
            }
        }

        document.getElementById('mobile-menu-btn').addEventListener('click', () => toggleMobileMenu());

        // Initialize application on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
